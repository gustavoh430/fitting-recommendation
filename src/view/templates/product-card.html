<div class="col-md-3">
    <div class="card product-card">
        <div class="card-body">
            <h5 class="card-title">Item #{{name}}</h5>
            <h6 class="card-subtitle mb-2 text-muted">{{category}}</h6>
            <p class="card-text text-sm">
                <strong>Size:</strong> {{size}} | <strong>Quality:</strong> {{quality}}<br>
                {{scoreHtml}}
            </p>
            <button class="btn btn-primary buy-now-btn" data-product='{{product}}'>Buy Now</button>
        </div>
    </div>
</div>
